substitutions:
  _SERVICE_NAME: bolasdejairo-api
  _REGION: us-central1
  _AR_REPOSITORY: backend-services
  _INSTANCE_CONNECTION_NAME: CHANGE_ME
  _DB_NAME: bolasdejairo
  _DB_USER: postgres
  _DB_PASSWORD_SECRET: bolasdejairo-db-password:latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --add-cloudsql-instances=${_INSTANCE_CONNECTION_NAME}
      - --set-env-vars=SPRING_PROFILES_ACTIVE=gcp,GCP_CLOUD_SQL_ENABLED=true,INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},DB_NAME=${_DB_NAME},DB_USERNAME=${_DB_USER},DB_INIT_ENABLED=false
      - --set-secrets=DB_PASSWORD=${_DB_PASSWORD_SECRET}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA
