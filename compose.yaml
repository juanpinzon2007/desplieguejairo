services:
  postgres:
    image: postgres:16-alpine
    container_name: bolasdejairo-postgres
    environment:
      POSTGRES_DB: bolasdejairo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bolasdejairo"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bolasdejairo-api
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bolasdejairo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_INIT_ENABLED: "true"
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
